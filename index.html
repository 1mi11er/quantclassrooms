<!DOCTYPE html>
<html>
<head>
  <title>Quantum Treasure Hunt</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
    canvas {
      border: 1px solid #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>Quantum Treasure Hunt</h2>
<p>Move your mouse to scan. Match frequency to reveal particles.</p>

<label>Frequency:</label>
<input type="range" id="freq" min="0" max="100" value="50">
<span id="freqVal">50</span>

<br>
<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mouse = { x: 300, y: 200 };
let frequency = 50;

// Update frequency display
const slider = document.getElementById("freq");
const freqVal = document.getElementById("freqVal");

slider.oninput = () => {
  frequency = parseInt(slider.value);
  freqVal.textContent = frequency;
};

// Track mouse
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

// Create hidden particles
const particles = Array.from({ length: 5 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  freq: Math.random() * 100
}));

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let closestSignal = 0;

  particles.forEach(p => {
    const dx = p.x - mouse.x;
    const dy = p.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    const freqDiff = Math.abs(p.freq - frequency);

    // Signal strength based on distance + frequency match
    const signal = Math.max(0, 1 - (dist / 150)) * Math.max(0, 1 - (freqDiff / 30));

    if (signal > 0.7) {
      // Reveal particle
      ctx.fillStyle = `hsl(${p.freq * 3}, 100%, 50%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    closestSignal = Math.max(closestSignal, signal);
  });

  // Draw torch
  let wiggle = closestSignal * 10;

  ctx.beginPath();
  ctx.arc(
    mouse.x + (Math.random() - 0.5) * wiggle,
    mouse.y + (Math.random() - 0.5) * wiggle,
    20,
    0,
    Math.PI * 2
  );

  ctx.strokeStyle = `hsl(${frequency * 3}, 100%, 70%)`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Signal indicator
  ctx.fillStyle = "white";
  ctx.fillText("Signal: " + closestSignal.toFixed(2), 10, 20);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
